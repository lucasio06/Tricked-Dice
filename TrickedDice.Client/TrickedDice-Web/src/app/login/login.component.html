<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="tricked-dice.png" alt="Tricked Dice" class="auth-logo" />
      <h1>INICIAR SESIÓN</h1>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="casino-input"
          [(ngModel)]="email"
          required
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="casino-input"
          [(ngModel)]="password"
          required
          [disabled]="isLoading"
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="play-button" [disabled]="isLoading">
        {{ isLoading ? 'ENTRANDO...' : 'ENTRAR' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/registro">Regístrate aquí</a>
    </p>

    <button class="btn-volver" (click)="router.navigate(['/'])">
      ← VOLVER AL LOBBY
    </button>
  </div>
</div>
