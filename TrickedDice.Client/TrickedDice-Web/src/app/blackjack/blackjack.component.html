<app-navbar></app-navbar>

<div class="casino-table-container">
  <div class="casino-header">
    <div class="stats-panel">
      <div class="stat-item">💰 SALDO: <span>{{ saldoActual | currency:'EUR' }}</span></div>
    </div>
    <button class="btn-exit" routerLink="/lobby">🏃 SALIR AL LOBBY</button>
  </div>

  <div class="table-felt">
    
    <div class="dealer-section" *ngIf="mesa && mesa.manoCrupier.length > 0">
      <div class="section-badge">🎩 CRUPIER ({{ getValorMano(mesa.manoCrupier) }})</div>
      <div class="cards-display">
        <img *ngFor="let carta of mesa.manoCrupier" [src]="obtenerRutaCarta(carta)" class="playing-card" />
      </div>
    </div>

    <div class="multiplayer-section">
      <div class="player-hand-container" *ngFor="let kvp of getJugadores()" [class.is-me]="kvp[0] === miPartidaId">
        <div class="player-badge">
          {{ kvp[1].nombreUsuario }} <span class="bet-amount">🪙 {{ kvp[1].monto }}€</span>
        </div>
        <div class="cards-display">
          <img *ngFor="let carta of kvp[1].manoJugador" [src]="obtenerRutaCarta(carta)" class="playing-card" [class.busted]="getValorMano(kvp[1].manoJugador) > 21" />
        </div>
        <div class="hand-score" [class.busted-text]="getValorMano(kvp[1].manoJugador) > 21">
          Puntos: {{ getValorMano(kvp[1].manoJugador) }}
          <span *ngIf="kvp[1].terminada"> (Plantado)</span>
          <span *ngIf="getValorMano(kvp[1].manoJugador) > 21"> (¡Te pasaste!)</span>
        </div>
      </div>
    </div>

    <div class="betting-controls" *ngIf="!miPartidaId">
      <h3>💸 ENTRAR A LA RONDA</h3>
      <div class="bet-input-group">
        <button class="btn-chip" (click)="apuestaActual = 10">10€</button>
        <button class="btn-chip" (click)="apuestaActual = 50">50€</button>
        <button class="btn-chip" (click)="apuestaActual = 100">100€</button>
        <input type="number" [(ngModel)]="apuestaActual" class="input-bet" />
      </div>
      <button class="btn-action pulse" (click)="apostarYJugar()">APOSTAR Y JUGAR</button>
    </div>

    <div class="action-controls" *ngIf="miPartidaId">
      <button class="btn-hit" (click)="pedirCarta()">🃏 PEDIR CARTA</button>
      <button class="btn-stand" (click)="plantarse()">🛑 PLANTARSE</button>
    </div>

  </div>
</div>
