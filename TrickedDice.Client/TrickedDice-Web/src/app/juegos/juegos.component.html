<app-navbar [usuarioActivo]="usuarioActivo"></app-navbar>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .casino-body {
    background: linear-gradient(135deg, #0f051d 0%, #1a0b2e 50%, #090411 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column; 
    align-items: center;
    padding-top: 130px;
    font-family: 'Montserrat', sans-serif;
  }

  .casino-title {
    font-size: 5.5rem;
    font-weight: 900;
    color: #e0c070;
    margin-bottom: 60px;
    text-transform: uppercase;
    letter-spacing: 4px;
    animation: electric-flicker 3.5s linear infinite;
  }

  @keyframes electric-flicker {
    0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% {
      color: #e0c070;
      text-shadow: 
        0 0 4px #ffecb3,
        0 0 11px #ffecb3,
        0 0 19px #fff,
        0 0 40px #a742f5,
        0 0 80px #a742f5,
        0 0 120px #a742f5;
    }
    20%, 21.9%, 63%, 63.9%, 65%, 69.9% {
      color: #332a1b;
      text-shadow: none;
    }
  }

  .game-card {
    background: linear-gradient(145deg, #1a1125, #0d0516);
    border: 1px solid rgba(204, 164, 90, 0.2);
    padding: 40px 30px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .game-card:hover {
    transform: translateY(-15px) scale(1.03);
    border-color: #cca45a;
    box-shadow: 0 20px 50px rgba(167, 66, 245, 0.5);
  }
  
  .game-img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 8px rgba(167, 66, 245, 0.4));
    transition: 0.4s;
  }

  .game-card:hover .game-img {
    filter: drop-shadow(0 0 15px rgba(204, 164, 90, 0.7));
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .rotate-constantly {
    animation: spin-slow 15s linear infinite;
  }

  .play-button {
    background: linear-gradient(to bottom, #e0c070, #cca45a, #997530);
    color: #130921;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-weight: 900;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
  }

  .play-button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(204, 164, 90, 0.6);
  }

</style>

<div class="casino-body">
  <h1 class="casino-title">TRICKED DICE</h1>

  <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 1200px;">
    <div *ngFor="let juego of juegos" class="game-card">
      <img [src]="getImagenJuego(juego)" 
           [alt]="juego" 
           class="game-img"
           [ngClass]="{'rotate-constantly': juego.toLowerCase().includes('ruleta')}">
      
      <h3 style="font-size: 1.8rem; margin-bottom: 25px; font-weight: 800; color: #f0d8a8;">{{ juego | uppercase }}</h3>
      <button class="play-button" style="width: 100%;" (click)="navegarAJuego(juego)">APOSTAR AHORA</button>
    </div>
  </div>
</div>
