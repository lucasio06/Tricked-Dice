<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .casino-body {
    background: linear-gradient(135deg, #0f051d 0%, #1a0b2e 50%, #090411 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column; 
    align-items: center;
    padding-top: 130px;
    font-family: 'Montserrat', sans-serif;
  }

  .premium-navbar {
    width: 100%;
    height: 80px;
    background: rgba(15, 5, 29, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(204, 164, 90, 0.4);
    box-shadow: 0 4px 30px rgba(167, 66, 245, 0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
  }

  .nav-logo-img {
    height: 65px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(167, 66, 245, 0.5));
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
  }

  .nav-logo-img:hover {
    transform: scale(1.1) rotate(-2deg);
    filter: brightness(1.3) drop-shadow(0 0 15px rgba(204, 164, 90, 0.8));
  }

  .nav-user-info {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(40, 20, 60, 0.4);
    padding: 8px 25px;
    border-radius: 50px;
    border: 1px solid rgba(204, 164, 90, 0.2);
    transition: all 0.3s ease;
  }

  .nav-user-info:hover {
    background: rgba(60, 30, 90, 0.6);
    border-color: #cca45a;
    box-shadow: 0 0 20px rgba(167, 66, 245, 0.4);
    transform: translateY(-2px);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background-color: #39FF14;
    border-radius: 50%;
    box-shadow: 0 0 10px #39FF14;
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-green {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
  }

  .status-text {
    color: #39FF14;
    font-size: 0.65rem;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
  }

  .user-nickname {
    color: #f0d8a8;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.95rem;
  }

  .btn-logout { 
    color: #ff55bb;
    border: none;
    background: none;
    cursor: pointer; 
    font-size: 0.7rem;
    font-weight: bold;
    text-decoration: underline;
    transition: all 0.3s ease;
  }

  .btn-logout:hover {
    color: #ff0000;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
    transform: scale(1.05);
  }

  .casino-title {
    font-size: 5.5rem;
    font-weight: 900;
    color: #e0c070;
    margin-bottom: 60px;
    text-transform: uppercase;
    letter-spacing: 4px;
    animation: electric-flicker 3.5s linear infinite;
  }

  @keyframes electric-flicker {
    0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% {
      color: #e0c070;
      text-shadow: 
        0 0 4px #ffecb3,
        0 0 11px #ffecb3,
        0 0 19px #fff,
        0 0 40px #a742f5,
        0 0 80px #a742f5,
        0 0 120px #a742f5;
    }
    20%, 21.9%, 63%, 63.9%, 65%, 69.9% {
      color: #332a1b;
      text-shadow: none;
    }
  }

  .game-card {
    background: linear-gradient(145deg, #1a1125, #0d0516);
    border: 1px solid rgba(204, 164, 90, 0.2);
    padding: 40px 30px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .game-card:hover {
    transform: translateY(-15px) scale(1.03);
    border-color: #cca45a;
    box-shadow: 0 20px 50px rgba(167, 66, 245, 0.5);
  }
  
  .game-img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 8px rgba(167, 66, 245, 0.4));
    transition: 0.4s;
  }

  .game-card:hover .game-img {
    filter: drop-shadow(0 0 15px rgba(204, 164, 90, 0.7));
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .rotate-constantly {
    animation: spin-slow 15s linear infinite;
  }

  .play-button {
    background: linear-gradient(to bottom, #e0c070, #cca45a, #997530);
    color: #130921;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-weight: 900;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
  }

  .play-button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(204, 164, 90, 0.6);
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(13, 5, 22, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  .modal-content {
    background: #1a1125;
    border: 2px solid #cca45a;
    border-radius: 25px;
    padding: 40px;
    width: 450px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 50px rgba(167, 66, 245, 0.3);
  }

  .casino-input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    background: #0f051d;
    border: 1px solid #3a2a50;
    color: #f0d8a8;
    border-radius: 8px;
    outline: none;
  }

  .casino-input:focus {
    border-color: #cca45a;
    box-shadow: 0 0 15px rgba(167, 66, 245, 0.5);
  }
  .saldo-container-nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #2a1a3a, #1a0a2a);
  padding: 5px 20px;
  border-radius: 20px;
  border: 1px solid #d4af37;
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
}

.saldo-label-nav {
  font-size: 0.65rem;
  color: #d4af37;
  letter-spacing: 1px;
  font-weight: bold;
}

.saldo-valor-nav {
  font-size: 1.2rem;
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
}

.btn-comprar-nav {
  background: linear-gradient(to bottom, #d4af37, #997530);
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: bold;
  color: #130921;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.9rem;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.btn-comprar-nav:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
  background: linear-gradient(to bottom, #e0c070, #cca45a);
}

</style>

<div class="casino-body">
  <nav class="premium-navbar">
    <div style="display: flex; align-items: center; gap: 20px;">
      <img src="tricked-dice.png" alt="Logo" class="nav-logo-img">
    
      <div *ngIf="usuarioActivo" class="saldo-container-nav">
        <span class="saldo-label-nav">SALDO</span>
        <span class="saldo-valor-nav">{{ saldoActivo | number:'1.2-2' }} €</span>
      </div>
      <button *ngIf="usuarioActivo" class="btn-comprar-nav" (click)="irARecargar()">
      COMPRAR
      </button>
    </div>

    <div *ngIf="usuarioActivo" class="nav-user-info">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">ONLINE</span>
      </div>
    
      <div style="display: flex; flex-direction: column; align-items: flex-start;">
        <span class="user-nickname">{{ usuarioActivo }}</span>
        <button class="btn-logout" (click)="logout()">CERRAR SESIÓN</button>
      </div>
    </div>

    <button *ngIf="!usuarioActivo" class="play-button" style="padding: 10px 25px; font-size: 0.8rem;" (click)="abrirModal('login')">
    LOGIN / REGISTRO
    </button>
  </nav>

  <h1 class="casino-title">TRICKED DICE</h1>

  <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 1200px;">
    <div *ngFor="let juego of juegos" class="game-card">
      <img [src]="getImagenJuego(juego)" 
           [alt]="juego" 
           class="game-img"
           [ngClass]="{'rotate-constantly': juego.toLowerCase().includes('ruleta')}">
      
      <h3 style="font-size: 1.8rem; margin-bottom: 25px; font-weight: 800; color: #f0d8a8;">{{ juego | uppercase }}</h3>
      <button class="play-button" style="width: 100%;">APOSTAR AHORA</button>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="mostrarModal" (click)="cerrarModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h2 style="color: #cca45a; margin-bottom: 25px; font-weight: 900; font-size: 2rem;">
        {{ esModoLogin ? 'INICIAR SESIÓN' : 'REGISTRO NUEVO' }}
      </h2>
      <ng-container *ngIf="!esModoLogin">
        <input  type="text" 
                placeholder="DNI *" 
                class="casino-input" 
                [(ngModel)]="usuarioData.dni"
                (input)="validarDNI()"
                (blur)="validarDNI()"
                [style.borderColor]="usuarioData.dni && dniInvalido ? '#ff4d4d' : '#3a2a50'">
          <small  *ngIf="usuarioData.dni && dniInvalido" 
                  style="color: #ff4d4d; font-size: 0.7rem; display: block; margin-top: -8px; margin-bottom: 12px; text-align: left;">
                  DNI no válido. Formato: 12345678Z </small>
        <input type="text" placeholder="NOMBRE REAL" class="casino-input" [(ngModel)]="usuarioData.nombre">
        <input type="text" placeholder="APELLIDO" class="casino-input" [(ngModel)]="usuarioData.primerApellido">
        <input type="date" class="casino-input" [(ngModel)]="usuarioData.fechaNacimiento" style="color-scheme: dark;">
        <input type="text" placeholder="NICKNAME" class="casino-input" [(ngModel)]="usuarioData.username">
      </ng-container>
      <input type="email" placeholder="EMAIL" class="casino-input" [(ngModel)]="usuarioData.email">
      <input type="password" placeholder="CONTRASEÑA" class="casino-input" [(ngModel)]="usuarioData.password">
      <button class="play-button" 
              style="width: 100%; margin-top: 15px;" 
              (click)="esModoLogin ? onLogin() : onRegistro()"
              [disabled]="!esModoLogin && dniInvalido"
              [style.opacity]="(!esModoLogin && dniInvalido) ? '0.5' : '1'">
              {{ esModoLogin ? 'ENTRAR' : 'CREAR CUENTA' }}
      </button>
      <p style="margin-top: 25px; font-size: 0.8rem; color: #aaa;">
        <span style="color: #cca45a; cursor: pointer;" (click)="esModoLogin = !esModoLogin">
          {{ esModoLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia Sesión' }}
        </span>
      </p>
      <button (click)="cerrarModal()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #7a6a90; font-size: 2.2rem; cursor: pointer;">×</button>
    </div>
  </div>
</div>
