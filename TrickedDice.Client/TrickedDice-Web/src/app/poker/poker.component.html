<app-navbar></app-navbar>
<div class="poker-wrapper">
  <div class="casino-room">
    <div class="poker-table">
      <div class="table-inner-ring">
        
        <div class="table-top-section">
          <div class="tabla-pagos-interna">
            <h3>TABLA DE PAGOS</h3>
            <div class="pago-item"><span>Escalera Real</span><span>250x</span></div>
            <div class="pago-item"><span>Escalera de Color</span><span>50x</span></div>
            <div class="pago-item"><span>Póker</span><span>25x</span></div>
            <div class="pago-item"><span>Full House</span><span>9x</span></div>
            <div class="pago-item"><span>Color</span><span>6x</span></div>
            <div class="pago-item"><span>Escalera</span><span>4x</span></div>
            <div class="pago-item"><span>Trío</span><span>3x</span></div>
            <div class="pago-item"><span>Doble Pareja</span><span>2x</span></div>
            <div class="pago-item"><span>Jotas o Mejor</span><span>1x</span></div>
          </div>

          <div class="pot-area">
            <span class="pot-text">PREMIO: {{ premioActual | number:'1.2-2' }} €</span>
          </div>
        </div>

        <div class="player-cards" *ngIf="mano.length > 0">
          <div *ngFor="let carta of mano; let i = index"
               class="playing-card"
               [class.seleccionada]="cartasSeleccionadas[i]"
               [class.animando]="animandoReparto && !cartasSeleccionadas[i]"
               [style.animation-delay]="(i * 0.1) + 's'"
               (click)="toggleSeleccion(i)">
            <div class="valor" [ngClass]="{'rojo': obtenerPalo(carta) === '♥' || obtenerPalo(carta) === '♦'}">{{ obtenerValor(carta) }}</div>
            <div class="palo" [ngClass]="{'rojo': obtenerPalo(carta) === '♥' || obtenerPalo(carta) === '♦'}">{{ obtenerPalo(carta) }}</div>
            <div class="hold" *ngIf="cartasSeleccionadas[i]">HOLD</div>
          </div>
        </div>

        <div class="player-cards" *ngIf="mano.length === 0">
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
          <div class="card-placeholder"></div>
        </div>

      </div>
    </div>

    <div class="controls-panel">
      <button class="btn-casino btn-action" (click)="repartir()" [disabled]="cargando || juegoIniciado">
        <span *ngIf="!cargando">REPARTIR</span>
        <span *ngIf="cargando">CARGANDO...</span>
      </button>
      
      <div class="bet-controls">
        <span class="bet-label">APUESTA:</span>
        <input type="number" [(ngModel)]="montoApuesta" [disabled]="juegoIniciado" min="1" class="bet-input">
      </div>

      <button class="btn-casino btn-action" (click)="cambiar()" [disabled]="cargando || !juegoIniciado">
        <span *ngIf="!cargando">CAMBIAR</span>
        <span *ngIf="cargando">CARGANDO...</span>
      </button>
    </div>

    <div class="mensaje" *ngIf="mensaje">{{ mensaje }}</div>
  </div>
</div>
